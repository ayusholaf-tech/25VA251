<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Solar System</title>

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #000428, #004e92);
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }

        .solar-system {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .sun {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70px;
            height: 70px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, yellow, orange);
            border-radius: 50%;
            box-shadow: 0 0 50px yellow;
        }

        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-60%, -60%);
            animation: rotate linear infinite;
        }

        .planet {
            position: absolute;
            top: 50%;
            left: 100%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            cursor: pointer;
        }

        .mercury {
            width: 120px;
            height: 120px;
            animation-duration: 6s;
        }

        .venus {
            width: 160px;
            height: 160px;
            animation-duration: 10s;
        }

        .earth {
            width: 200px;
            height: 200px;
            animation-duration: 14s;
        }

        .mars {
            width: 240px;
            height: 240px;
            animation-duration: 20s;
        }

        .jupiter {
            width: 280px;
            height: 280px;
            animation-duration: 25s;
        }

        .saturn {
            width: 320px;
            height: 320px;
            animation-duration: 30s;
        }

        .uranus {
            width: 360px;
            height: 360px;
            animation-duration: 35s;
        }

        .neptune {
            width: 400px;
            height: 400px;
            animation-duration: 40s;
        }

        /* Planet Sizes & Colors */
        .mercury .planet {
            width: 10px;
            height: 10px;
            background: gray;
        }

        .venus .planet {
            width: 18px;
            height: 18px;
            background: orange;
        }

        .earth .planet {
            width: 20px;
            height: 20px;
            background: blue;
        }

        .mars .planet {
            width: 15px;
            height: 15px;
            background: red;
        }

        .jupiter .planet {
            width: 30px;
            height: 30px;
            background: #d9a066;
        }

        .saturn .planet {
            width: 25px;
            height: 25px;
            background: gold;
        }

        .uranus .planet {
            width: 20px;
            height: 20px;
            background: cyan;
        }

        .neptune .planet {
            width: 20px;
            height: 20px;
            background: blue;
        }

        /* 🌙 Moon */
        .moon-orbit {
           
            width: 50px;
            height: 50px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            animation: rotate 4s linear infinite;
        }

        .moon {
            width: 6px;
            height: 6px;
            background: white;
            position: absolute;
            top: 50%;
            left: 100%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }

        @keyframes rotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }

            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        
    </style>
</head>

<body>

    <div class="solar-system">

        <div class="sun"></div>

        <div class="orbit mercury">
            <div class="planet mercury"></div>
        </div>
        <div class="orbit venus">
            <div class="planet venus"></div>
        </div>

        <div class="orbit earth">
            <div class="planet earth">
                <div class="moon-orbit">
                    <div class="moon"></div>
                </div>
            </div>
        </div>

        <div class="orbit mars">
            <div class="planet mars"></div>
        </div>
        <div class="orbit jupiter">
            <div class="planet jupiter"></div>
        </div>
        <div class="orbit saturn">
            <div class="planet saturn"></div>
        </div>
        <div class="orbit uranus">
            <div class="planet uranus"></div>
        </div>
        <div class="orbit neptune">
            <div class="planet neptune"></div>
        </div>

    </div>

    <div class="controls">
        <button onclick="toggleAnimation()">⏸ Pause / ▶ Resume</button><br><br>
        Speed: <input type="range" min="1" max="10" value="1" id="speedControl">
    </div>


    <div id="infoBox">
        <h3 id="planetName">Click a Planet</h3>
        <p id="planetInfo"></p>
    </div>

</html>
