<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //js variable data value type 
        //primitive : immutable single  value and store in memory 
        // string===
        var myName="Ayush";
        console.log("my name is +myName");
        console.log(typeof(myName));
        //number
        var myMob=7701845527;
        console.log("My Mobile Number is" +myMob);
        console.log(typeof(myMob)); 
        //boolean
        var isMarried=true;
        console.log(myName +"is not married"+ isMarried);
        console.log(typeof(isMarried));
        //undefined 
        var myAdd;
        console.log(myName+"address is"+myAdd);
        console.log(typeof(myAdd));
        //null
        var myEmail=null;
        console.log(myName+"e-mail address is " +myEmail);
        console.log(typeof(myEmail));
    



    </script>
</body>
</html>
