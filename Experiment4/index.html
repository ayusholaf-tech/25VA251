<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment-1</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Grade Calculator</h2>
        <h3>Enter Number of Subjects:</h3>
        <form action="">
            <input type="number" id="subjects">
        </form>
        <button onclick="calculateResult()">Calculate Result</button>
        <div id="result"></div>
    </div>
    <script>
        function calculateResult() {
            const n = document.getElementById("subjects").value;
            let total = 0;
            let i;
            for (i = 0; i < n; i++) {
                let x = parseFloat(prompt("Enter the subject number" + (i + 1)));
                total += x;
            }
            let average = total / n;
            let grade;
            if (average >= 90) {
                grade = "A";
            }
            else if (average >= 75) {
                grade = "B";
            }
            else if (average >= 50) {
                grade = "C";
            }
            else {
                grade = "F";
            }
            let result;
            if (average >= 40) {
                result = "PASS";
            }
            else {
                result = "FAIL";
            }
            let result2 = document.getElementById("result").innerHTML = "Total Marks: " + total
                + "<br>" + "Average Marks: " + average.toFixed(2) + "<br>" + "Grade: "
                + grade + "<br>" + "Result: " + result;
        }
    </script>
</body>

</html>
