<!DOCTYPE html>
<html>
<head>
    <title>Student Result</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
            text-align: center;
            width: 300px;
        }

        h2{
            color: #333;
        }

        label{
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input{
            width: 90%;
            padding: 8px;
            margin-top: 5px;
        }

        button{
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover{
            background-color: #0056b3;
        }

        #output{
            margin-top: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Result</h2>

    <label>Maths</label>
    <input type="number" id="m1">

    <label>Physics</label>
    <input type="number" id="m2">

    <label>Chemistry</label>
    <input type="number" id="m3">

    <label>English</label>
    <input type="number" id="m4">

    <label>Computer</label>
    <input type="number" id="m5">

    <button onclick="result()">Show Result</button>

    <p id="output"></p>
</div>

<script>
function result() {
    let m1 = Number(document.getElementById("m1").value);
    let m2 = Number(document.getElementById("m2").value);
    let m3 = Number(document.getElementById("m3").value);
    let m4 = Number(document.getElementById("m4").value);
    let m5 = Number(document.getElementById("m5").value);

    let total = m1 + m2 + m3 + m4 + m5;
    let percentage = total / 5;
    let grade;

    if (percentage >= 60)
        grade = "First Class";
    else if (percentage >= 40)
        grade = "Second Class";
    else
        grade = "Fail";

    document.getElementById("output").innerHTML =
        "Total Marks: " + total +
        "<br>Percentage: " + percentage.toFixed(2) + "%" +
        "<br>Result: " + grade;
}
</script>

</body>
</html>
