<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .container {
            display: flex;
            gap: 10px;
        }

        input {
            padding: 10px;
            width: 250px;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }

        ul {
            margin-top: 20px;
            padding: 0;
        }

        li {
            list-style: none;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }

        .delete-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>To-Do List</h1>

    <div class="container">
        <input type="text" id="taskInput" placeholder="Enter a task">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>

    <script>
        function addTask() {
            const input = document.getElementById("taskInput");
            const taskText = input.value.trim();

            if (taskText === "") return;

            const li = document.createElement("li");

            li.innerHTML = `
            <span>${taskText}</span>
            <button class="delete-btn" onclick="this.parentElement.remove()">
                Delete
            </button>
        `;

            document.getElementById("taskList").appendChild(li);

            input.value = "";
            input.focus();
        }

        document.getElementById("taskInput").addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                addTask();
            }
        });
    </script>

</body>

</html>
